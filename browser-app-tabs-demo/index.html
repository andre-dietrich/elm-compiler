<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Multi-Tab CRDT Demo</title>
</head>
<body>
<div id="app"></div>
<script src="elm.js"></script>
<script src="crdt-runtime.js"></script>
<script>
  var app = Elm.Main.init({
    node: document.getElementById("app"),
    flags: crypto.randomUUID()
  });
  // crdt-runtime.js's message-kind detection (tag byte 0/1/2) works
  // unchanged regardless of which Crdt.Sync.Codec Main.elm picks --
  // see Main.elm's `codec` value.
  attachCrdtSync(app, {});
</script>
</body>
</html>
